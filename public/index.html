<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Empty icon: suppresses the browser's automatic /favicon.ico request so
         it isn't a 404 in the console. A real favicon is branding (issue 03). -->
    <link rel="icon" href="data:," />

    <!--
      The fixed shell — the platform's one static UI surface (ARCH §4, §6.1).
      It ships once and never changes; everything inside the regions below is
      generated at runtime and streamed in by later epics. This file owns
      structure, the static shell layout, and asset plumbing. Visual styling
      (colors, fonts, theme), sidebar collapse/responsive behavior, the
      cold-start orb, and product-voice copy/branding are all issue 03.
    -->

    <!-- Placeholder tab title. Product name/voice/branding is issue 03; the
         repo name "omni-crud" is an engineering name and is not user-facing
         (ARCH §9.7), so no wordmark here. -->
    <title>Workspace</title>

    <!--
      Vendored client libraries (ARCH §4) — HTMX 2.0.10 + Alpine.js 3.15.12,
      committed under public/vendor/ at exact patch versions and served from our
      own /static/, no CDN and no build step. `defer` runs both after the DOM is
      parsed: HTMX wires up hx-* attributes (none yet) and Alpine starts the
      x-data root below.
    -->
    <script defer src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>

    <!--
      Static shell layout only — the Claude/ChatGPT shape: a left sidebar
      (capability toolbar) beside a content column whose content area fills the
      space and whose prompt bar is pinned to the bottom. Structural rules only
      (flex, sizing) plus 1px placeholder borders for delineation — NO colors,
      fonts, theme, spacing polish, collapse, or responsive behavior; those are
      issue 03, which replaces this whole block with public/app.css.
    -->
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
      }

      /* Row: sidebar + content column, filling the viewport. */
      .shell {
        display: flex;
        height: 100vh;
      }

      /* Left sidebar — fixed width, scrolls independently. */
      .toolbar {
        flex: 0 0 16rem;
        overflow: auto;
        border-right: 1px solid;
      }

      /* Right column — takes the remaining width; stacks content over prompt. */
      .content-column {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      /* Content area — fills the remaining height, scrolls independently. */
      .content {
        flex: 1 1 auto;
        overflow: auto;
      }

      /* Prompt bar — pinned to the bottom of the content column. */
      .prompt {
        flex: 0 0 auto;
        padding: 0.5rem;
        border-top: 1px solid;
      }
      .prompt input {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <!--
      Empty Alpine root (no state/directives yet) so later epics extend the
      shell rather than restructure it (e.g. issue 03's sidebar-collapse state).
    -->
    <div class="shell" x-data>
      <!-- Capability toolbar — the left sidebar; empty, the registry
           rehydrates it later. -->
      <nav class="toolbar" aria-label="Capabilities"></nav>

      <!-- Content column — the content area fills the space above the
           bottom-pinned prompt bar. -->
      <div class="content-column">
        <!-- Content area — empty; capabilities and SSE streams render here. -->
        <main class="content"></main>

        <!-- Prompt bar — a real form, but inert: no hx-post yet, and submission
             is suppressed so it neither reloads nor calls the orchestrator. -->
        <form class="prompt" onsubmit="return false">
          <input type="text" aria-label="Prompt" />
        </form>
      </div>
    </div>
  </body>
</html>
