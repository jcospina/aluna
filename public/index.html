<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Empty icon: suppresses the browser's automatic /favicon.ico request so
         it isn't a 404 in the console. A real favicon mark is future work. -->
    <link rel="icon" href="data:,">

    <!--
      The fixed shell — Aluna's one static UI surface (ARCH §4, §6.1). It ships
      once and never changes; everything inside the regions below is generated at
      runtime and streamed in by later epics. Layout is the Claude/ChatGPT shape:
      a collapsible left sidebar (the capability toolbar) beside a content column
      whose content area fills the space and whose prompt bar is pinned to the
      bottom. Style is subtler neobrutalism on Paper & Ink — see
      docs/design-system.md and docs/adr/0001.
    -->

    <!-- Aluna is the user-facing brand (ARCH §9.7); the repository's engineering
         name never appears in the UI (not even in this page's source). -->
    <title>Aluna</title>

    <!-- Authored style — semantic tokens, Outfit (vendored), the shell layout.
         Static from /static/app.css, no build step. -->
    <link rel="stylesheet" href="/static/app.css">

    <!--
      Scripts, all vendored/static and deferred (run in document order after the
      DOM is parsed, before DOMContentLoaded). HTMX wires hx-* attributes; the
      SSE extension teaches HTMX the sse-connect / sse-swap / sse-close vocabulary
      that the per-build stream uses to drive swaps (ADR-0002, Epic 2.6).

      Order matters twice:
        - htmx-ext-sse.min.js calls htmx.defineExtension at load, so it must come
          AFTER htmx.min.js.
        - app.js registers the Alpine `shell` component on the `alpine:init`
          event, so it must run BEFORE alpine.min.js — Alpine's cdn build
          auto-starts in a microtask the moment it executes (dispatching
          `alpine:init`), which is before any later deferred script would run.
    -->
    <script defer src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/htmx-ext-sse.min.js"></script>
    <script defer src="/static/app.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
  </head>

  <body>
    <!--
      The shell. Alpine `shell` component (public/app.js) holds two bits of
      presentation state: `hasCapabilities` (false at cold-start → sidebar hidden)
      and `open` (the sidebar shown/expanded — collapse chrome). Both are
      reflected as classes the stylesheet keys off; with neither class the markup
      renders the correct cold-start state, so there's no flash before Alpine.
    -->
    <div
      class="shell"
      x-data="shell"
      :class="{ 'has-capabilities': hasCapabilities, 'sidebar-open': open }"
    >
      <!-- Capability toolbar — the left sidebar. Hidden at cold-start; the
           registry rehydrates its entries (and flips hasCapabilities) later. -->
      <nav class="toolbar" id="capability-toolbar" aria-label="Capabilities">
        <!-- Sidebar-top home of the Aluna wordmark (shown when the sidebar is). -->
        <p class="wordmark">Aluna<span class="wordmark__dot" aria-hidden="true">.</span></p>
        <!-- Capability entries render here later. -->
      </nav>

      <!-- Mobile drawer backdrop — tap to dismiss the open sidebar. Shown only on
           mobile while the drawer is open (CSS); inert otherwise. -->
      <div class="backdrop" @click="open = false" aria-hidden="true"></div>

      <!-- Content column — the content area fills the space above the
           bottom-pinned prompt bar. -->
      <div class="content-column">
        <!-- Top bar — hosts the sidebar toggle (shell chrome). Shown only when a
             sidebar exists; at cold-start there's nothing to toggle. -->
        <div class="content-topbar">
          <button
            type="button"
            class="sidebar-toggle"
            @click="open = !open"
            :aria-expanded="open ? 'true' : 'false'"
            aria-controls="capability-toolbar"
            aria-label="Toggle capabilities"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect x="3" y="4" width="18" height="16" rx="2" />
              <line x1="9" y1="4" x2="9" y2="20" />
            </svg>
          </button>
        </div>

        <!-- Content area — empty surface; capabilities and SSE streams render
             here later. At cold-start it shows the Aluna wordmark and the
             current builder-stage verification output (hidden once
             capabilities exist). -->
        <main class="content">
          <div class="cold-start">
            <h1 class="wordmark">Aluna<span class="wordmark__dot" aria-hidden="true">.</span></h1>

            <!-- Module 2: the prompt bar below drives the production build-job
                 flow — POST /prompt admits a job immediately, then the
                 per-build stream classifies, deflects unsupported requests, or
                 proceeds through the builder. The previews are developer-only
                 visibility until the committed capability swap fully takes over. -->
            <div class="intro">
              <!-- Demo-only: the spec streams in here as it builds (raw,
                   internals visible on purpose — this is the developer's
                 liveness view, not product UI). Hidden until the first
                 snapshot (:empty). -->
              <pre class="spec-build__preview" id="spec-build-preview" aria-hidden="true"></pre>
              <pre class="spec-build__preview" id="spec-migration-preview" aria-hidden="true"></pre>
              <pre class="spec-build__preview" id="spec-units-preview" aria-hidden="true"></pre>
              <pre class="spec-build__preview" id="spec-gate-preview" aria-hidden="true"></pre>
              <pre class="spec-build__preview" id="spec-commit-preview" aria-hidden="true"></pre>
              <div class="intro__output" id="spec-build-output" aria-live="polite"></div>
            </div>
          </div>
        </main>

        <!-- Prompt bar — wired to POST /prompt and the per-build stream. -->
        <form class="prompt" id="spec-build-form">
          <div class="prompt__composer">
            <input
              class="prompt__field"
              type="text"
              id="spec-build-prompt"
              name="prompt"
              value="I want to keep track of my notes"
              aria-label="Prompt"
              placeholder="What would you like to keep track of?"
            >
            <button type="submit" class="prompt__submit" id="spec-build-trigger">Make it</button>
          </div>
          <div id="prompt-notice" class="prompt__notice" aria-live="polite"></div>
        </form>
      </div>
    </div>
  </body>
</html>
